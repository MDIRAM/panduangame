# Production Nginx Configuration for wghcenter.site

# HTTP server (Port 80)
# - Used for Cloudflare Flexible SSL (recommended)
# - Also used by Let's Encrypt / Certbot for certificate verification (.well-known)
server {
    listen 80;
    listen [::]:80;
    server_name wghcenter.site www.wghcenter.site;
    server_tokens off;

    root /var/www/html/public;
    index index.php index.html;

    # Let's Encrypt validation path
    location /.well-known/acme-challenge/ {
        root /var/www/html/public;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    location ~ /\.ht {
        deny all;
    }
}

