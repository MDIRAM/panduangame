# Production Nginx Configuration for wghcenter.site

# HTTP server (Port 80)
# - Redirects all HTTP traffic to HTTPS
# - Keeps Let's Encrypt validation path accessible
server {
    listen 80;
    listen [::]:80;
    server_name wghcenter.site www.wghcenter.site;
    server_tokens off;

    # Let's Encrypt validation path
    location /.well-known/acme-challenge/ {
        root /var/www/html/public;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server (Port 443)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name wghcenter.site www.wghcenter.site;
    server_tokens off;

    root /var/www/html/public;
    index index.php index.html;

    # Let's Encrypt paths
    ssl_certificate     /etc/nginx/ssl/live/wghcenter.site/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/wghcenter.site/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    location ~ /\.ht {
        deny all;
    }
}
